<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — Prisma</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-brand">
      <a href="index.html" class="nav-logo">⚡ Prisma</a>
      <p>Acesse sua conta</p>
    </div>
    <div class="auth-card">
      <h2>Bem-vindo de volta!</h2>
      <p class="auth-sub">Entre com seu e-mail e senha</p>
      <div id="login-alert" class="alert hidden"></div>
      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" placeholder="seu@email.com" required />
          <span class="field-error" id="email-error"></span>
        </div>
        <div class="form-group">
          <label for="password">Senha</label>
          <div class="input-icon-wrap">
            <input type="password" id="password" placeholder="••••••••" required />
            <button type="button" class="toggle-pw" onclick="togglePw('password')">👁</button>
          </div>
          <span class="field-error" id="password-error"></span>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="login-btn">Entrar</button>
      </form>
      <div class="auth-divider"><span>ou</span></div>
      <div class="demo-accounts">
        <p class="demo-title">🧪 Contas de demonstração</p>
        <div class="demo-btns">
          <button class="btn btn-demo" onclick="loginDemo('aluno')">Entrar como Aluno</button>
          <button class="btn btn-demo" onclick="loginDemo('professor')">Entrar como Professor</button>
          <button class="btn btn-demo" onclick="loginDemo('empresa')">Entrar como Empresa</button>
        </div>
      </div>
      <p class="auth-footer">Não tem conta? <a href="register.html">Cadastre-se grátis</a></p>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/data.js"></script>
  <script src="js/ui.js"></script>
  <script>
    if (Auth.getCurrentUser()) window.location.href = 'dashboard.html';

    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      let valid = true;
      document.getElementById('email-error').textContent = '';
      document.getElementById('password-error').textContent = '';
      if (!email) { document.getElementById('email-error').textContent = 'Informe o e-mail.'; valid = false; }
      if (!password) { document.getElementById('password-error').textContent = 'Informe a senha.'; valid = false; }
      if (!valid) return;
      const btn = document.getElementById('login-btn');
      btn.textContent = 'Entrando...'; btn.disabled = true;
      setTimeout(() => {
        const result = Auth.login(email, password);
        if (result.success) {
          UI.showAlert('login-alert', 'Login realizado! Redirecionando...', 'success');
          setTimeout(() => window.location.href = 'dashboard.html', 800);
        } else {
          UI.showAlert('login-alert', result.message, 'error');
          btn.textContent = 'Entrar'; btn.disabled = false;
        }
      }, 400);
    });

    function loginDemo(role) {
      const demos = { aluno: { email: 'aluno@demo.com', password: 'demo123' }, professor: { email: 'professor@demo.com', password: 'demo123' }, empresa: { email: 'empresa@demo.com', password: 'demo123' } };
      Data.seedDemoData();
      const d = demos[role];
      const result = Auth.login(d.email, d.password);
      if (result.success) window.location.href = 'dashboard.html';
      else UI.showAlert('login-alert', 'Erro ao carregar conta demo.', 'error');
    }

    function togglePw(id) { const el = document.getElementById(id); el.type = el.type === 'password' ? 'text' : 'password'; }
  </script>
</body>
</html>
